<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de cartas aleatorias</title>

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
  integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
  <!-- Mi hoja de estilos -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container" id="container">
    <div class="card-container">
      <div class="card" id="card">
        <div class="icon">♠</div>
        <div class="number" id="number">8</div>
        <div class="icon">♠</div>
      </div>
      <button id="generateRandomCardButton">Generate random card</button>
      <button id="generateEvery3secondsButton">Generate random card every 3 seconds</button>
    </div>
    <div class="cardInputs">
      <h2>Change the background color:</h2>
      <select name="backgroundColorSelect" id="backgroundColorSelect">
        <option value="">Select a Background Color</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="black">Black</option>
        <option value="yellow">Yellow</option>
        <option value="red">Red</option>
      </select>
      <div class="cardSizeInputs">
        <div class="sizeInput">
          <label for="cardWidth">Width:</label>
          <input type="number" id="cardWidth" placeholder="Enter the width size in px. Min: 200">
        </div>
        <div class="sizeInput">
          <label for="cardHeight">Height:</label>
          <input type="number" id="cardHeight" placeholder="Enter the height size in px. Min: 600">
        </div>
      </div>
      <button id="changeCardSizeButton">Change the card size</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
